name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install pypdf pdfminer.six anthropic Pillow yt-dlp

      # whisper requires torch which is large; install cpu-only variant
      - name: Install Whisper (cpu)
        run: pip install openai-whisper torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
